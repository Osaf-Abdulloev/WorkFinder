{% extends "base.html" %}
{% block title %}Cancel Application | WorkFinder{% endblock %}
{% block main %}
<section class="card">
    <h1 class="title">Cancel Application</h1>
    <p>This action will remove your submitted application.</p>
    <form action="" method="post" class="form-actions">
        {% csrf_token %}
        <button class="btn" type="submit">Confirm Cancel</button>
        <a class="btn btn-outline" href="{% url 'aplicationss' %}">Back</a>
    </form>
</section>
{% endblock %}
