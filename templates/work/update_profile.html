{% extends "base.html" %}
{% block title %}Update Profile | WorkFinder{% endblock %}
{% block main %}
<section class="card">
    <h1 class="title">Update Profile</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="grid grid-2">
            <div>
                <label>Username</label>
                <input name="username" value="{{ user.username }}">
                <label>Email</label>
                <input name="email" value="{{ user.email }}">
                <label>Phone</label>
                <input name="phone" value="{{ user.phone }}">
                <label>Age</label>
                <input name="age" value="{{ user.age }}">
                <label>Address</label>
                <input name="adress" value="{{ user.adress }}">
                <label>Avatar</label>
                <input type="file" name="img">
            </div>
            <div>
                {% if seeker %}
                    <label>Bio</label>
                    <textarea name="bio">{{ seeker.bio }}</textarea>
                    <label>Experience</label>
                    <input name="exp" value="{{ seeker.exp }}">
                    <label>Education</label>
                    <input name="edu" value="{{ seeker.edu }}">
                    <label>Birth date</label>
                    <input type="date" name="burth_date" value="{{ seeker.burth_date|date:'Y-m-d' }}">
                    <label>Resume</label>
                    <input type="file" name="resume">
                {% endif %}
                {% if employer %}
                    <label>Company Name</label>
                    <input name="company_name" value="{{ employer.company_name }}">
                    <label>About Company</label>
                    <textarea name="about">{{ employer.about }}</textarea>
                    <label>Company Location</label>
                    <input name="location" value="{{ employer.location }}">
                    <label>Company Logo</label>
                    <input type="file" name="logo">
                {% endif %}
            </div>
        </div>
        <div class="form-actions">
            <button class="btn" type="submit">Save Profile</button>
        </div>
    </form>
</section>
{% endblock %}
