{% extends "acc/reg.html" %}

{% block main %}
<section class="card">
    <h1 class="title">Password Reset Confirmation</h1>
    <form action="{% url 'emailconf2' %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" name="username">
        <label>Code from email</label>
        <input type="text" name="code">
        {% if eror %}
            <p style="color:#ff9ea7">{{eror}}</p>
        {% endif %}
        <div class="form-actions">
            <button class="btn" type="submit">Confirm</button>
        </div>
    </form>
</section>
{% endblock %}
