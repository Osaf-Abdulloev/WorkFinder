<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <nav>
            {% if request.user.is_authenticated %}

                <a href="{% url 'home' %}">home</a>
                <a href="{% url 'logout_us' %}">logout</a>
                <a href="{% url 'all_jobs' %}">all_jobs</a>
                <a href="{% url 'create_job' %}">create_job</a>
                <a href="{% url 'profile' request.user.id %}">profile</a>
            
            {% else %}

                <a href="{% url 'register' %}">register</a>
                <a href="{% url 'emailconf' %}">emailconf</a>
                <a href="{% url 'login' %}">login</a>

            {% endif %}
        </nav>
    </header>

    {% block main %}
    {% endblock %}

    <footer>
        <p>footer @ ihuerfyber </p>
    </footer>
</body>
</html>
