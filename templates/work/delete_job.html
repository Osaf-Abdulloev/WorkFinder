{% extends "base.html" %}
{% block title %}Delete Job | WorkFinder{% endblock %}
{% block main %}
<section class="card">
    <h1 class="title">Delete Job</h1>
    <p>Are you sure you want to delete <strong>"{{j.title}}"</strong>?</p>
    <form action="" method="post" class="form-actions">
        {% csrf_token %}
        <button class="btn" type="submit">Yes, Delete</button>
        <a class="btn btn-outline" href="{% url 'all_jobs' %}">Cancel</a>
    </form>
</section>
{% endblock %}
