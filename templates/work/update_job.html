{% extends "base.html" %}
{% block title %}Update Job | WorkFinder{% endblock %}
{% block main %}
<section class="card">
    <h1 class="title">Update Job</h1>
    <form action="" method="post">
        {% csrf_token %}
        <label>Company</label>
        <select name="company" required>
            {% for i in e %}
                <option value="{{ i.id }}" {% if j.company.id == i.id %}selected{% endif %}>{{ i.company_name }}</option>
            {% endfor %}
        </select>
        <label>Title</label>
        <input type="text" value="{{j.title}}" name="title" required>
        <label>Description</label>
        <textarea name="description">{{j.description}}</textarea>
        <label>Salary</label>
        <input type="number" value="{{j.sallary}}" name="sallary" required>
        <label>Location</label>
        <input type="text" value="{{j.location}}" name="location" required>
        <label>Job type</label>
        <select name="job_type">
            {% for value, name in job_types %}
                <option value="{{ value }}" {% if j.job_type == value %}selected{% endif %}>{{ name }}</option>
            {% endfor %}
        </select>
        <label>Experience required (years)</label>
        <input type="number" value="{{j.exp_req}}" name="exp_req" required>
        <label>Category</label>
        <select name="category" required>
            {% for i in c %}
                <option value="{{ i.id }}" {% if j.category.id == i.id %}selected{% endif %}>{{ i.name }}</option>
            {% endfor %}
        </select>
        <div class="form-actions">
            <button class="btn" type="submit">Save Changes</button>
        </div>
    </form>
</section>
{% endblock %}
