{% extends "base.html" %}
{% block title %}Register | WorkFinder{% endblock %}
{% block main %}
<section class="card">
    <h1 class="title">Create Account</h1>
    <p class="subtitle">Join as a seeker or employer.</p>
    <form action="" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="grid grid-2">
            <div>
                <label>Username</label>
                <input type="text" name="username" required>
                <label>Password</label>
                <input type="password" name="pas1" required>
                <label>Repeat Password</label>
                <input type="password" name="pas2" required>
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div>
                <label>Role</label>
                <select name="role">
                    <option value="">Choose role</option>
                    <option value="seeker">Seeker</option>
                    <option value="employer">Employer</option>
                </select>
                <label>Age</label>
                <input type="number" name="age" required>
                <label>Phone</label>
                <input type="text" name="phone">
                <label>Address</label>
                <input type="text" name="adress">
                <label>Avatar (optional)</label>
                <input type="file" name="img">
            </div>
        </div>
        {% if eror %}
            <p style="color:#ff9ea7">{{eror}}</p>
        {% endif %}
        <div class="form-actions">
            <button class="btn" type="submit">Register</button>
            <a class="btn btn-outline" href="{% url 'login' %}">Have an account?</a>
        </div>
    </form>
</section>
{% endblock  %}
