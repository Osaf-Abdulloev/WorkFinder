<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% for i in s %}
        <p>{{i.user.username}}</p>
        <p>{{i.bio}}</p>
        <a href="{{i.resume.url}}">Resume</a>
        <p>{{i.exp}}</p>
        <p>{{i.edu}}</p>
        <p>{{i.adress}}</p>
        <p>{{i.user.role}}</p>
        <p>{{i.user.age}}</p>
        <p>{{i.user.phone}}</p>
        <a href="{% url 'update_profile' i.id %}">update_profile</a>
        {% if i.user.img %}
            <img width="300px" style="border-radius: 50%;" src="{{ i.user.img.url }}" alt="">
        {% else %}
            <img width="300px" style="border-radius: 50%;" src="/media/users/def.jpg" alt="">
        {% endif %}
        <a href="{% url 'aplicationss' %}">Aplications</a>
        <a href="{% url 'update_profile' i.id %}">update_profile</a>
    {% endfor %}
</body>
</html>
