{% extends "acc/reg.html" %}

{% block main %}
    <form action="" method="post">
        {% csrf_token %}

        <label for="username">Username</label><br>
         <input type="text" name="username" id=""><br><br>
        
        <label for="pas">Password</label><br>
         <input type="text" name="pas" id=""><br><br>
        
        {% if eror %}
            <p>{{eror}}</p>
            {% if eror == 'imvalid username or password' %}
                <a href="{% url 'forget' %}">Forget password ?</a><br><br>
            {% endif %}
        {% endif %}
        
        <button type="submit">Login</button>
    </form>
{% endblock %}
