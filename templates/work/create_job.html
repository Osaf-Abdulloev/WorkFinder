{% extends "base.html" %}
{% block title %}Create Job | WorkFinder{% endblock %}
{% block main %}
<section class="card">
    <h1 class="title">Create New Job</h1>
    <form action="{% url 'create_job' %}" method="post">
        {% csrf_token %}
        <label>Company</label>
        <select name="company" required>
            <option value="">Choose company</option>
            {% for i in e %}
                <option value="{{ i.id }}">{{ i.company_name }}</option>
            {% endfor %}
        </select>
        <label>Title</label>
        <input type="text" name="title" required>
        <label>Description</label>
        <textarea name="description" required></textarea>
        <label>Salary</label>
        <input type="number" name="sallary" required>
        <label>Location</label>
        <input type="text" name="location" required>
        <label>Job type</label>
        <select name="job_type">
            {% for value, name in job_types %}
                <option value="{{ value }}">{{ name }}</option>
            {% endfor %}
        </select>
        <label>Experience required (years)</label>
        <input type="number" name="exp_req" required>
        <label>Category</label>
        <select name="category" required>
            <option value="">Choose category</option>
            {% for i in c %}
                <option value="{{ i.id }}">{{ i.name }}</option>
            {% endfor %}
        </select>
        <div class="form-actions">
            <button class="btn" type="submit">Publish Job</button>
        </div>
    </form>
</section>
{% endblock %}
