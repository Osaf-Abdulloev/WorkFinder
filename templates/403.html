<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — Доступ запрещён</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        .container{
            text-align: center;
            background: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            font-size: 100px;
            color: #ff4d4d;
            margin-bottom: 10px;
        }

        h2{
            font-size: 28px;
            margin-bottom: 15px;
        }

        p{
            color: #dcdcdc;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        a{
            display: inline-block;
            text-decoration: none;
            background: #ff4d4d;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: bold;
        }

        a:hover{
            background: #ff1f1f;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>403</h1>
        <h2>Доступ запрещён</h2>

        <p>
            У вас нет прав для просмотра этой страницы.
            Возможно, требуется авторизация или специальные разрешения.
        </p>

        <a href="/">Вернуться на главную</a>
    </div>

</body>
</html>
